#local application.properties


spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=QAPDBS;encrypt=true;trustServerCertificate=true

spring.datasource.username=admin_qa
spring.datasource.password=srb@1029
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


spring.redis.host=localhost
spring.redis.port=6379
spring.cache.type=redis

## EUREKA CLIENT
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
#
## IMPORTANT (prevents hostname resolution issue)
#eureka.instance.prefer-ip-address=true

# EUREKA CLIENT
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# IMPORTANT (fix hostname issue)
eureka.instance.prefer-ip-address=true


# Kafka Server
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.bootstrap-servers=localhost:9092
# Consumer Group
spring.kafka.consumer.group-id=PRODUCT-GROUP

# Offset behavior
spring.kafka.consumer.auto-offset-reset=earliest

# Key Deserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Value Deserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Allow DTO packages
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.consumer.properties.spring.json.value.default.type=com.srb.product.model.OrderDto


# Kafka Server
spring.kafka.producer.bootstrap-servers=localhost:9092
# Producer Key Serializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

# Producer Value Serializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Topic auto creation (optional)
spring.kafka.admin.auto-create=true

